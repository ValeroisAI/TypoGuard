<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#09090b" />
        <title>EagleSky</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div id="root"></div>

        <main id="popup-shell" class="popup-shell">
            <header class="header">
                <div class="brand">
                    <img src="logo192.png" alt="EagleSky" class="logo" />
                    <div>
                        <h1>EagleSky</h1>
                        <p>Domain Guard</p>
                    </div>
                </div>

                <label class="switch-wrap" title="Auto Redirect">
                    <span>Auto</span>
                    <input id="auto-toggle" type="checkbox" />
                </label>
            </header>

            <form id="scan-form" class="scan-form">
                <input
                    id="url-input"
                    type="text"
                    placeholder="ornek: yo.utube.com"
                    autocomplete="off"
                />
                <button id="scan-btn" type="submit">Analyze</button>
            </form>

            <div class="actions">
                <button id="scan-tab-btn" class="ghost-btn" type="button">
                    Active tab'i tara
                </button>
            </div>

            <section id="result-card" class="result-card hidden">
                <div class="row">
                    <span>Status</span>
                    <strong id="status-text">-</strong>
                </div>
                <div class="row">
                    <span>Domain</span>
                    <code id="domain-text">-</code>
                </div>
                <div class="row">
                    <span>Score</span>
                    <strong id="score-text">-</strong>
                </div>
                <div class="row">
                    <span>Suggestion</span>
                    <code id="suggestion-text">-</code>
                </div>
                <p id="desc-text" class="desc"></p>
                <button id="go-safe-btn" class="safe-btn hidden" type="button">
                    Safe Redirect
                </button>
            </section>

            <section class="history">
                <h2>Recent scans</h2>
                <div id="history-list" class="history-list"></div>
            </section>
        </main>

        <script src="popup.js"></script>
    </body>
</html>
